# mcp-server.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: mcp-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: mcp-server }
  template:
    metadata:
      labels: { app: mcp-server }
    spec:
      containers:
        - name: mcp-server
          image: {{ mcp-server-image }}
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: {{ mcp-server-port}} }]
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: mcp-demo
spec:
  selector: { app: mcp-server }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
