apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-to-trades
spec:
  podSelector:
    matchLabels:
      app: trades
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: trades-mcp-server
      ports:
        - protocol: TCP
          port: 8080
