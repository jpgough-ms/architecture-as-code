apiVersion: apps/v1
kind: Deployment
metadata:
  name: trades-mcp-server
  labels:
    app: trades-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trades-mcp-server
  template:
    metadata:
      labels:
        app: trades-mcp-server
    spec:
      containers:
        - name: trades-mcp-server
          image: {{ mcp-server-image }}
          imagePullPolicy: Never
          ports:
            - containerPort: {{ mcp-server-port }}
          env:
            - name: QUARKUS_REST_CLIENT__COM_DEMO_TRADESMCP_TRADESAPICLIENT__URL
              value: "http://trades"
